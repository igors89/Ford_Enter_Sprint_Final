<div class="d-flex flex-column vh-100 verde-fundo">
    <header class="d-flex flex-wrap align-items-center justify-content-between py-3 px-4 border-bottom bg-light flex-shrink-0">
        <div class="col-md-3">
            <p class="m-0 fs-4 fw-semibold text-dark questrial-regular">Amanda Guene</p>
        </div>
        <div class="col-md-3 text-end">
            <button class="btn btn-outline-danger rounded-pill px-4" (click)="logout()">Sair</button>
        </div>
    </header>
    <main class="flex-grow-1 overflow-auto p-4">
        <div class="container bg-white rounded-4 shadow-sm p-4 d-flex flex-column" style="max-width: 1200px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fs-4 m-0 fw-bold questrial-regular">Gerenciamento de Pacientes</h2>
                <button class="btn btn-outline-verde rounded-pill px-4 fw-bold questrial-regular" data-bs-toggle="modal" data-bs-target="#modalPaciente">+ Novo Paciente</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle text-center">
                    <thead class="table-light">
                        <tr>
                            <th class="py-3 text-secondary">Nome do Paciente</th>
                            <th class="py-3 text-secondary">Contato (WhatsApp)</th>
                            <th class="py-3 text-secondary">Início do Tratamento</th>
                            <th class="py-3 text-secondary">Notificações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let p of pacientes">
                            <td class="fw-medium text-dark">{{ p.nome }}</td>
                            <td>{{ formatarContato(p.contato) }}</td>
                            <td>{{ p.dataInicio | date:'dd/MM/yyyy' }}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary rounded-pill px-3 me-2 d-inline-flex align-items-center gap-2" (click)="lembreteSessao(p)">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-whatsapp" viewBox="0 0 16 16">
                                        <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/>
                                    </svg> Lembrar Sessão
                                </button>
                                <button class="btn btn-sm btn-outline-success rounded-pill px-3 d-inline-flex align-items-center gap-2" (click)="lembretePagamento(p)">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-whatsapp" viewBox="0 0 16 16">
                                        <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/>
                                    </svg> Lembrar Pagamento
                                </button>
                            </td>
                        </tr>
                        <tr *ngIf="pacientes.length === 0">
                            <td colspan="4" class="text-center py-4 text-muted">Nenhum paciente cadastrado.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <footer class="py-3 border-top flex-shrink-0 text-center azul-fundo">
        <p class="text-body-secondary mb-0 small">© 2026 Todos os direitos reservados</p>
    </footer>
</div>

<div class="modal fade" id="modalPaciente" tabindex="-1" aria-hidden="true" data-bs-backdrop="false" style="background-color: rgba(0, 0, 0, 0.5);">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
                <h1 class="modal-title fs-4 fw-bold questrial-regular">Cadastrar Paciente</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form #formCadastro="ngForm" (ngSubmit)="salvarPaciente()">
                <div class="modal-body p-4">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control rounded-3 questrial-regular" id="nomePac" name="nome" [(ngModel)]="formPaciente.nome" required>
                        <label class="questrial-regular text-secondary">Nome completo</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="number" class="form-control rounded-3 questrial-regular" id="contatoPac" name="contato" [(ngModel)]="formPaciente.contato" required>
                        <label class="questrial-regular text-secondary">WhatsApp (somente números)</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="date" class="form-control rounded-3 questrial-regular" id="dataPac" name="dataInicio" [(ngModel)]="formPaciente.dataInicio" required>
                        <label class="questrial-regular text-secondary">Data de Início</label>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pb-4 px-4 pt-0 d-flex justify-content-between">
                    <button type="button" class="btn btn-light rounded-pill px-4 questrial-regular" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" data-bs-dismiss="modal" class="btn btn-outline-verde  rounded-pill px-4 fw-bold questrial-regular" [disabled]="!formCadastro.valid">
                        Salvar Paciente
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
