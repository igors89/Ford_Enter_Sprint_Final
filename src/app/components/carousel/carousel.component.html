<div class="py-5 my-5 verde-fundo" id="avaliacoes">
    <p class="fs-5 fw-bolder questrial-regular lh-1 mb-3 verde-destaque text-uppercase text-center border-bottom pb-3">Avaliações</p>
    <h2 class="pb-2 text-center mb-5 questrial-regular fw-semibold">Experiências de quem já caminhou comigo</h2>
    <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner py-3">
            <div class="carousel-item" *ngFor="let grupo of gruposAvaliacoes; let i = index" [class.active]="i === 0" data-bs-interval="4000">
                <div class="container">
                    <div class="row row-cols-1 row-cols-md-3 g-4 px-5">
                        <div class="col" *ngFor="let item of grupo">
                            <div class="h-100 p-4 bg-light border rounded-3 text-start shadow-sm d-flex flex-column">
                                <div class="d-inline-flex align-items-center justify-content-center azul-fundo bg-gradient fs-4 rounded-3 p-2 mb-3" style="width: 50px; height: 50px;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
                                        <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                                    </svg>
                                </div>
                                <h4 class="fw-bold">{{ item.nome }}</h4>
                                <p class="text-warning mb-2 fs-1">
                                    {{ '★'.repeat(item.nota) }}{{ '☆'.repeat(5 - item.nota) }}
                                </p>
                                <p class="flex-grow-1 text-secondary">"{{ item.review }}"</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev" style="filter: invert(100%); width: 5%;">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next" style="filter: invert(100%); width: 5%;">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
    <div class="d-flex justify-content-center mt-5 pt-2">
        <button type="button" class="btn btn-outline-dark rounded-pill px-4 py-2 fw-medium d-inline-flex align-items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-chat-dots" viewBox="0 0 16 16">
            <path d="M5 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0m4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0m3 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2"/>
            <path d="m2.165 15.803.02-.004c1.83-.363 2.948-.842 3.468-1.105A9 9 0 0 0 8 15c4.418 0 8-3.134 8-7s-3.582-7-8-7-8 3.134-8 7c0 1.76.743 3.37 1.97 4.6a10.4 10.4 0 0 1-.524 2.318l-.003.011a11 11 0 0 1-.244.637c-.079.186.074.394.273.362a22 22 0 0 0 .693-.125m.8-3.108a1 1 0 0 0-.287-.801C1.618 10.83 1 9.468 1 8c0-3.192 3.004-6 7-6s7 2.808 7 6-3.004 6-7 6a8 8 0 0 1-2.088-.272 1 1 0 0 0-.711.074c-.387.196-1.24.57-2.634.893a11 11 0 0 0 .398-2"/>
            </svg>
            Deixar uma avaliação
        </button>
    </div>
</div>
